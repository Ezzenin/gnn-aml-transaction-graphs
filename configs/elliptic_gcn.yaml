# Sanity-конфиг мини-GCN (Задача 3.5). НЕ для приёмки этапа 1 —
# проверка, что PyG-конвейер обучается end-to-end. На этапе 2 расширяется.
seed: 42
device: cpu              # cpu | mps | cuda

dataset:
  name: elliptic
  root: data/elliptic

model:
  type: gcn
  params:
    hidden_channels: 64
    dropout: 0.5

train:
  epochs: 200
  lr: 0.01
  weight_decay: 0.0005
  patience: 20

val_fraction: 0.2
output_dir: results
