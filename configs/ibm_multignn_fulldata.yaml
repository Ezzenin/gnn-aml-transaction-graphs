# Фаза D: полный Multi-GNN — GINe + reverse + port + ego (все адаптации вместе).
# Верхняя точка ablation-сетки; сравнивается с base (ibm_gine) и одиночными.
seed: 42
device: cuda            # на Mac без CUDA автоматически откатится на cpu

dataset:
  include_time: false   # P1.6: ablation без norm_time
  name: ibm_aml
  root: data/ibm_aml
  variant: HI-Small
  # max_rows: 300000    # быстрый smoke-прогон на подвыборке

model:
  type: gine
  params:
    hidden: 64
    num_layers: 2
    dropout: 0.5
    reverse_mp: true
    ports: true
    ego_ids: true

train:
  full_data: true        # учить на ВСЕХ train-рёбрах (class weights)
  num_neighbors: [10, 10]
  batch_size: 2048
  neg_ratio: 20
  val_neg_cap: 50000
  epochs: 15
  patience: 5
  lr: 0.005
  weight_decay: 0.0005

output_dir: results
output_name: ibm_multignn_fulldata
checkpoint_dir: checkpoints
save_checkpoint: true

wandb:
  enabled: false
  project: gnn-aml
  entity: null
